name: Publish to NuGet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        hana_major: [6, 7, 8, 9, 10]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ./EFCore.Hana.HybridMigrations.slnx -p:HanaEfCoreMajor=${{ matrix.hana_major }}

      - name: Test
        run: dotnet test ./EFCore.Hana.HybridMigrations.slnx -c Release -p:HanaEfCoreMajor=${{ matrix.hana_major }} --no-restore --nologo

      - name: Pack
        run: >
          dotnet pack ./src/EFCore.Hana.HybridMigrations/EFCore.Hana.HybridMigrations.csproj
          -c Release
          -p:HanaEfCoreMajor=${{ matrix.hana_major }}
          -p:RepositoryUrl=https://github.com/${{ github.repository }}
          --no-build
          -o ./artifacts/${{ matrix.hana_major }}
          --nologo

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/${{ matrix.hana_major }}/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
